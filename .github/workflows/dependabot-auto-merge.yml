name: Dependabot auto-merge

# Enables GitHub's native auto-merge on Dependabot PRs. Auto-merge just
# arms the PR to merge itself the moment all required status checks (the
# "build" check from test.yml) go green — it does not bypass CI.
#
# Which PRs get armed:
# - github-actions ecosystem: ALL updates, including majors. Workflows pin
#   floating major tags (e.g. actions/checkout@v4), so patch/minor updates
#   arrive silently as GitHub moves the tag and Dependabot only ever files
#   major bumps — restricting to patch/minor would auto-merge nothing.
#   Known trade-off: PR CI does not exercise tag/dispatch-triggered release
#   workflows, so a breaking action major there surfaces at the next
#   release run, which fails loudly and is easy to fix.
# - Go modules: patch/minor only. Major bumps mean API breaks in our own
#   code: dependabot.yml excludes them from the grouped patch/minor PRs,
#   so they land as separate PRs that never match the check below and
#   require a manual merge.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (all actions updates, patch/minor Go modules)
        if: |
          steps.metadata.outputs.package-ecosystem == 'github_actions' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
