name: Build and Test
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Pin the golangci-lint version so local and CI runs match; bump
  # deliberately (see docs/go-expert-review.md / issue #355).
  GOLANGCI_LINT_VERSION: v2.5.0
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - v[0-9]+.[0-9x]+.x
      # Integration branch for the Go expert-review roadmap (#368): its PRs
      # must pass the same build/lint/race gates as PRs to main.
      # NB: '+' is a one-or-more quantifier in Actions filter patterns and
      # must be escaped, otherwise this entry never matches (verified on
      # PRs #375/#378/#380, which all ran without the Build and Test gate).
      - worktree-feature\+golang-expert-review
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
        env:
          GOTOOLCHAIN: go1.25.3
      - name: Run tests with coverage
        run: make cover
      - name: Per-package coverage summary
        if: always()
        run: |
          {
            echo "## Coverage by package"
            echo '```'
            go tool cover -func=coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check coverage gate
        run: ./scripts/check-coverage.sh "$(cat .coverage-min)"

  # Static analysis: govet, staticcheck, errcheck, errorlint, unused,
  # ineffassign, revive (config: .golangci.yml). Independent of the `build`
  # job so a lint failure/slowdown never delays the coverage gate.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
        env:
          GOTOOLCHAIN: go1.25.3
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" "$GOLANGCI_LINT_VERSION"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint (all workspace modules)
        run: make lint

  # Race detector across all workspace modules. Separate job (not `needs:
  # build`) so it runs in parallel and its timing never affects the
  # coverage job.
  race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
        env:
          GOTOOLCHAIN: go1.25.3
      - name: Run tests with -race (all workspace modules)
        run: make test-race

  # Additive visibility only — never blocks merging. Computes the PR
  # branch's aggregate coverage against main's so a reviewer can see at a
  # glance whether a PR moved the needle, without running `make cover`
  # locally on both branches themselves.
  coverage-delta:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
        env:
          GOTOOLCHAIN: go1.25.3
      - name: Coverage on PR branch
        run: |
          make cover
          echo "PR_COVERAGE=$(go tool cover -func=coverage.txt | awk '/^total:/{print $3}' | tr -d '%')" >> "$GITHUB_ENV"
      - name: Coverage on main
        run: |
          git worktree add /tmp/main-checkout origin/main
          (cd /tmp/main-checkout && make cover)
          echo "MAIN_COVERAGE=$(go tool cover -func=/tmp/main-checkout/coverage.txt | awk '/^total:/{print $3}' | tr -d '%')" >> "$GITHUB_ENV"
      - name: Post coverage delta
        run: |
          delta=$(awk -v pr="$PR_COVERAGE" -v main="$MAIN_COVERAGE" 'BEGIN { printf "%+.1f", pr - main }')
          {
            echo "## Coverage delta vs main"
            echo "PR: ${PR_COVERAGE}% · main: ${MAIN_COVERAGE}% · delta: ${delta}pp"
          } >> "$GITHUB_STEP_SUMMARY"

  # Builds a temporary arm64 .deb for manual testing of this PR's changes —
  # NOT a release artifact (version is derived from `git describe`, not a
  # tag). Separate from package-release.yml, which only runs against tags.
  build-pr-deb:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
        env:
          GOTOOLCHAIN: go1.25.3
      - name: Generate assets (host-native — must not be cross-compiled)
        run: make generate
      - name: Cross-compile arm64 binary
        run: GOOS=linux GOARCH=arm64 make -C myhome build
      - name: Package .deb
        run: make ARCH=arm64 debpkg-package
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: myhome-deb-arm64-pr-${{ github.event.pull_request.number }}
          path: myhome_*.deb
          retention-days: 7
